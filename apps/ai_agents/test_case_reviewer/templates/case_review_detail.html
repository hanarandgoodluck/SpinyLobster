{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinyLobster - 测试用例 AI 评审</title>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://cdn.staticfile.org/element-plus/2.5.6/index.css">
    <link rel="preconnect" href="https://cdn.staticfile.org">
    <link rel="dns-prefetch" href="https://cdn.staticfile.org">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            padding: 20px;
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .review-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .review-card {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: white;
            border: 1px solid #ebeef5;
        }
        .review-header {
            padding: 16px 20px;
            border-bottom: 1px solid #ebeef5;
            background-color: #409eff;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .review-body {
            padding: 20px;
        }
        .review-footer {
            padding: 16px 20px;
            border-top: 1px solid #ebeef5;
            text-align: right;
            background-color: #fafafa;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-col {
            flex: 1;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #606266;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-left: 10px;
        }
        .btn-primary {
            background-color: #409eff;
            color: white;
        }
        .btn-success {
            background-color: #67c23a;
            color: white;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="review-app">
        <div class="review-container">
            <div class="review-card">
                <div class="review-header">
                    测试用例AI评审
                </div>
                <div class="review-body">
                    <el-form :model="formData" label-width="100px">
                        <el-form-item label="状态">
                            <el-select v-model="formData.status" placeholder="请选择状态">
                                <el-option label="待评审" value="pending"></el-option>
                                <el-option label="评审通过" value="approved"></el-option>
                                <el-option label="评审未通过" value="rejected"></el-option>
                            </el-select>
                        </el-form-item>

                        <div class="form-row">
                            <div class="form-col">
                                <el-form-item label="BU">
                                    <el-select v-model="formData.bu" placeholder="请选择 BU">
                                        <el-option label="教育" value="education"></el-option>
                                        <el-option label="用户中心" value="user_center"></el-option>
                                        <el-option label="协同" value="collaboration"></el-option>
                                        <el-option label="IM" value="im"></el-option>
                                        <el-option label="工作台" value="workspace"></el-option>
                                        <el-option label="招聘" value="recruitment"></el-option>
                                        <el-option label="工作管理" value="work_management"></el-option>
                                        <el-option label="AI 应用" value="ai_application"></el-option>
                                        <el-option label="运营平台" value="operation_platform"></el-option>
                                    </el-select>
                                </el-form-item>
                            </div>
                            <div class="form-col">
                                <el-form-item label="Feature">
                                    <el-select v-model="formData.feature" placeholder="请选择 Feature" @change="handleFeatureChange">
                                        <el-option label="Feature1" value="feature1"></el-option>
                                        <el-option label="Feature2" value="feature2"></el-option>
                                        <el-option label="+ 添加新 Feature" value="add_new"></el-option>
                                    </el-select>
                                </el-form-item>
                            </div>
                            <div class="form-col">
                                <el-form-item label="Priority">
                                    <el-select v-model="formData.priority" placeholder="请选择优先级">
                                        <el-option label="P0" value="p0"></el-option>
                                        <el-option label="P1" value="p1"></el-option>
                                        <el-option label="P2" value="p2"></el-option>
                                        <el-option label="P3" value="p3"></el-option>
                                    </el-select>
                                </el-form-item>
                            </div>
                        </div>

                        <el-form-item label="用例描述">
                            <el-input v-model="formData.description" type="textarea" :rows="3" placeholder="请输入用例描述"></el-input>
                        </el-form-item>
                        
                        <el-form-item label="测试步骤">
                            <el-input v-model="formData.test_steps" type="textarea" :rows="5" placeholder="请输入测试步骤"></el-input>
                        </el-form-item>
                        
                        <el-form-item label="预期结果">
                            <el-input v-model="formData.expected_results" type="textarea" :rows="5" placeholder="请输入预期结果"></el-input>
                        </el-form-item>

                        <el-form-item label="AI 评审结果">
                            <el-input v-model="formData.ai_review_result" type="textarea" :rows="5" readonly placeholder="点击开始评审后显示AI评审结果"></el-input>
                        </el-form-item>
                    </el-form>
                </div>
                <div class="review-footer">
                    <el-button type="primary" @click="startReview" :loading="reviewing">开始评审</el-button>
                    <el-button type="success" @click="saveReview">保存</el-button>
                </div>
            </div>
        </div>
    </div>

    <!-- Vue 3 -->
    <!-- Vue 3 (生产版本 + defer) -->
    <script src="https://cdn.staticfile.org/vue/3.4.21/vue.global.prod.js" defer></script>
    <!-- Element Plus (压缩版本 + defer) -->
    <script src="https://cdn.staticfile.org/element-plus/2.5.6/index.full.min.js" defer></script>
    
    <script>
    const { createApp, ref, reactive } = Vue;

    const app = createApp({
        data() {
            return {
                formData: {
                    test_case_id: '',
                    status: 'pending',
                    bu: '',
                    feature: '',
                    priority: '',
                    description: '',
                    test_steps: '',
                    expected_results: '',
                    ai_review_result: ''
                },
                reviewing: false
            };
        },
        
        methods: {
            getCSRFToken() {
                const metaTag = document.querySelector('meta[name="csrf-token"]');
                if (metaTag) {
                    return metaTag.getAttribute('content');
                }
                
                // 备用方法：从cookie获取
                const name = 'csrftoken';
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            },
            
            async loadTestCaseData() {
                const urlParams = new URLSearchParams(window.location.search);
                const testCaseId = urlParams.get('id');
                
                if (testCaseId) {
                    try {
                        const response = await fetch(`api/test-case/${testCaseId}/`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            }
                        });
                        
                        const data = await response.json();
                        
                        this.formData.test_case_id = data.id;
                        this.formData.description = data.description;
                        this.formData.test_steps = data.test_steps;
                        this.formData.expected_results = data.expected_results;
                        this.formData.status = data.status;
                        this.formData.bu = data.bu || '';
                        this.formData.feature = data.feature || '';
                        this.formData.priority = data.priority || '';
                    } catch (error) {
                        ElementPlus.ElMessage.error('获取测试用例数据失败');
                    }
                }
            },
            
            async startReview() {
                if (!this.formData.test_case_id) {
                    ElementPlus.ElMessage.warning('请先选择测试用例');
                    return;
                }
                
                this.reviewing = true;
                this.formData.ai_review_result = '评审中...';
                
                try {
                    const response = await fetch('api/review/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCSRFToken()
                        },
                        body: JSON.stringify({
                            test_case_id: this.formData.test_case_id
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.formData.ai_review_result = data.review_result;
                        ElementPlus.ElMessage.success('AI评审完成！');
                    } else {
                        this.formData.ai_review_result = '评审失败：' + data.message;
                        ElementPlus.ElMessage.error('评审失败：' + data.message);
                    }
                } catch (error) {
                    this.formData.ai_review_result = '评审请求失败，请查看控制台获取详细信息';
                    ElementPlus.ElMessage.error('评审请求失败');
                } finally {
                    this.reviewing = false;
                }
            },
            
            async saveReview() {
                if (!this.formData.test_case_id) {
                    ElementPlus.ElMessage.warning('请先选择测试用例');
                    return;
                }
                
                try {
                    const response = await fetch('api/update-test-case/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCSRFToken()
                        },
                        body: JSON.stringify({
                            test_case_id: this.formData.test_case_id,
                            status: this.formData.status,
                            bu: this.formData.bu,
                            feature: this.formData.feature,
                            priority: this.formData.priority,
                            description: this.formData.description,
                            test_steps: this.formData.test_steps,
                            expected_results: this.formData.expected_results
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        ElementPlus.ElMessage.success('保存成功！');
                        window.close();
                        if (window.opener) {
                            window.opener.location.reload();
                        }
                    } else {
                        ElementPlus.ElMessage.error('保存失败：' + data.message);
                    }
                } catch (error) {
                    ElementPlus.ElMessage.error('保存失败');
                }
            },
            
            handleFeatureChange(value) {
                if (value === 'add_new') {
                    ElementPlus.ElMessageBox.prompt('请输入新的 Feature 名称', '添加新 Feature', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        inputPattern: /.+/,
                        inputErrorMessage: 'Feature 名称不能为空'
                    }).then(({ value }) => {
                        if (value && value.trim()) {
                            // 这里可以添加逻辑来保存新的feature
                            const newFeatureValue = value.toLowerCase().replace(/\s+/g, '_');
                            this.formData.feature = newFeatureValue;
                            
                            // 添加到选项列表（这里简化处理，实际应该从后端获取）
                            ElementPlus.ElMessage.success('新 Feature 已添加');
                        }
                    }).catch(() => {
                        // 用户取消，恢复默认值
                        this.formData.feature = '';
                    });
                }
            }
        },
        
        mounted() {
            this.loadTestCaseData();
        }
    });

    app.use(ElementPlus);
    app.mount('#review-app');
    </script>
</body>
</html>
