                                            <button class="btn btn-outline-primary" type="button"

<script src="https://cdn.staticfile.org/vue/3.4.21/vue.global.prod.js" defer></script>
<script src="https://cdn.staticfile.org/element-plus/2.5.6/index.full.min.js" defer></script>
<script>
(function() {
    'use strict';
    console.log('Vue script loaded');
    
    // 等待 DOM 完全加载
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM fully loaded');
        
        if (typeof Vue === 'undefined') {
            console.error('Vue is not loaded');
            return;
        }
        
        const { createApp } = Vue;
        console.log('Vue is available:', typeof Vue);
        
        const appDiv = document.getElementById('ai-config-app');
        console.log('App div found:', !!appDiv);
        
        if (!appDiv) {
            console.error('Element #ai-config-app not found');
            return;
        }
        
        console.log('Creating Vue app...');
        
        const app = createApp({
            data() {
                return {
                    // 全局配置状态 - 独立的 LLM 和 Vision 状态
                    globalActiveTab: 'llm',
                    globalConfig: {
                        llm: {
                            baseUrl: '',
                            apiKey: '',
                            modelName: '',
                            showPassword: false
                        },
                        vision: {
                            baseUrl: '',
                            apiKey: '',
                            modelName: '',
                            showPassword: false
                        }
                    },
                    
                    // 项目配置状态 - 独立的 LLM 和 Vision 状态
                    projects: [],
                    selectedProject: null,
                    projectActiveTab: 'llm',
                    useGlobal: true,
                    projectConfig: {
                        llm: {
                            baseUrl: '',
                            apiKey: '',
                            modelName: '',
                            showPassword: false
                        },
                        vision: {
                            baseUrl: '',
                            apiKey: '',
                            modelName: '',
                            showPassword: false
                        }
                    },
                    
                    // Bootstrap Modal 实例缓存
                    $messageModal: null
                };
            },
            
            methods: {
                // CSRF Token
                getCSRFToken() {
                    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                },
                
                // 切换密码显示
                togglePassword(type, scope) {
                    if (scope === 'global') {
                        this.globalConfig[type].showPassword = !this.globalConfig[type].showPassword;
                    } else {
                        this.projectConfig[type].showPassword = !this.projectConfig[type].showPassword;
                    }
                },
                
                // 加载项目列表
                async loadProjects() {
                    try {
                        const response = await fetch('/api/projects/');
                        const data = await response.json();
                        
                        if (data.success) {
                            this.projects = data.projects;
                        }
                    } catch (error) {
                        console.error('加载项目失败:', error);
                    }
                },
                
                // 选择项目
                selectProject(project) {
                    this.selectedProject = project;
                    this.loadProjectConfig(project.id);
                },
                
                // 加载全局配置
                async loadGlobalConfig() {
                    try {
                        const response = await fetch('/ai_config/api/global/');
                        const data = await response.json();
                        
                        if (data.success && data.config) {
                            // 分别填充 LLM 和 Vision 配置
                            this.globalConfig.llm.baseUrl = data.config.llm.base_url || '';
                            this.globalConfig.llm.apiKey = data.config.llm.api_key || '';
                            this.globalConfig.llm.modelName = data.config.llm.model_name || '';
                            
                            this.globalConfig.vision.baseUrl = data.config.vision.base_url || '';
                            this.globalConfig.vision.apiKey = data.config.vision.api_key || '';
                            this.globalConfig.vision.modelName = data.config.vision.model_name || '';
                        }
                    } catch (error) {
                        console.error('加载全局配置失败:', error);
                    }
                },
                
                // 加载项目配置
                async loadProjectConfig(projectId) {
                    try {
                        const response = await fetch(`/ai_config/api/project/${projectId}/`);
                        const data = await response.json();
                        
                        if (data.success && data.config) {
                            this.useGlobal = data.config.use_global;
                            
                            // 分别填充 LLM 和 Vision 配置
                            this.projectConfig.llm.baseUrl = data.config.llm.base_url || '';
                            this.projectConfig.llm.apiKey = data.config.llm.api_key || '';
                            this.projectConfig.llm.modelName = data.config.llm.model_name || '';
                            
                            this.projectConfig.vision.baseUrl = data.config.vision.base_url || '';
                            this.projectConfig.vision.apiKey = data.config.vision.api_key || '';
                            this.projectConfig.vision.modelName = data.config.vision.model_name || '';
                        }
                    } catch (error) {
                        console.error('加载项目配置失败:', error);
                    }
                },
                
                // 切换项目配置显示
                toggleProjectConfig() {
                    // Vue 会自动处理 v-show
                },
                
                // 保存全局配置
                async saveGlobalConfig(modelType) {
                    const config = this.globalConfig[modelType];
                    
                    // 获取当前全局配置
                    const currentResponse = await fetch('/ai_config/api/global/');
                    const currentData = await currentResponse.json();
                    
                    const configData = currentData.success ? currentData.config : { llm: {}, vision: {} };
                    
                    // 更新指定类型的配置
                    if (modelType === 'llm') {
                        configData.llm = {
                            base_url: config.baseUrl,
                            api_key: config.apiKey,
                            model_name: config.modelName
                        };
                    } else {
                        configData.vision = {
                            base_url: config.baseUrl,
                            api_key: config.apiKey,
                            model_name: config.modelName
                        };
                    }
                    
                    try {
                        const response = await fetch('/ai_config/api/global/save/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            },
                            body: JSON.stringify(configData)
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            this.showMessage(`${modelType.toUpperCase()} 配置已保存`, '成功', 'success');
                        } else {
                            this.showMessage('保存失败：' + data.message, '错误', 'danger');
                        }
                    } catch (error) {
                        this.showMessage('保存失败：' + error.message, '错误', 'danger');
                    }
                },
                
                // 保存项目配置
                async saveProjectConfig(modelType) {
                    if (!this.selectedProject) {
                        this.showMessage('请先选择一个项目', '提示', 'warning');
                        return;
                    }
                    
                    const config = this.projectConfig[modelType];
                    
                    const configData = {
                        use_global: this.useGlobal,
                        llm: {},
                        vision: {}
                    };
                    
                    if (!this.useGlobal) {
                        if (modelType === 'llm') {
                            configData.llm = {
                                base_url: config.baseUrl,
                                api_key: config.apiKey,
                                model_name: config.modelName
                            };
                        } else {
                            configData.vision = {
                                base_url: config.baseUrl,
                                api_key: config.apiKey,
                                model_name: config.modelName
                            };
                        }
                    }
                    
                    try {
                        const response = await fetch(`/ai_config/api/project/${this.selectedProject.id}/save/`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            },
                            body: JSON.stringify(configData)
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            this.showMessage(`${modelType.toUpperCase()} 配置已保存`, '成功', 'success');
                        } else {
                            this.showMessage('保存失败：' + data.message, '错误', 'danger');
                        }
                    } catch (error) {
                        this.showMessage('保存失败：' + error.message, '错误', 'danger');
                    }
                },
                
                // 测试连接
                async testConnection(scope, modelType) {
                    const config = scope === 'global' ? this.globalConfig[modelType] : this.projectConfig[modelType];
                    
                    if (!config.baseUrl && !config.apiKey) {
                        this.showMessage('请至少填写 API Base URL 或 API Key 中的一个', '提示', 'warning');
                        return;
                    }
                    
                    try {
                        const response = await fetch('/ai_config/api/test-connection/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            },
                            body: JSON.stringify({
                                base_url: config.baseUrl,
                                api_key: config.apiKey,
                                model_type: modelType
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            this.showMessage(`连接测试成功！\n\n${data.details || data.message}`, '成功', 'success');
                        } else {
                            this.showMessage(data.message, '错误', 'danger');
                        }
                    } catch (error) {
                        this.showMessage(`连接测试失败：${error.message}`, '错误', 'danger');
                    }
                },
                
                // 关闭弹窗
                closeModal() {
                    const modalEl = document.getElementById('messageModal');
                    if (modalEl && this.$messageModal) {
                        this.$messageModal.hide();
                    }
                },
                
                // 显示消息提示 - 使用 Bootstrap 原生模态框（复用实例）
                showMessage(message, title = '提示', type = 'info') {
                    if (!message) {
                        console.warn('showMessage called with empty message');
                        return;
                    }
                    
                    // 设置标题和内容
                    document.getElementById('messageModalLabel').textContent = title;
                    const contentEl = document.getElementById('messageContent');
                    contentEl.innerHTML = message.replace(/\n/g, '<br>');
                    contentEl.className = `alert alert-${type}`;
                    
                    // 获取或创建模态框实例（复用）
                    const modalEl = document.getElementById('messageModal');
                    if (!this.$messageModal) {
                        this.$messageModal = new bootstrap.Modal(modalEl, {
                            backdrop: true,
                            keyboard: true
                        });
                    }
                    this.$messageModal.show();
                },
            },
            
            mounted() {
                // 加载数据
                console.log('Vue app mounted!');
                this.loadProjects();
                this.loadGlobalConfig();
            }
        });
        
        app.mount('#ai-config-app');
        
        console.log('Vue app initialization complete');
    });
})();
