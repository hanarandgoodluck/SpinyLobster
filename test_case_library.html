<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用例库页面</title>
    <!-- Element Plus CSS (使用 jsdelivr) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.5.6/dist/index.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div id="app">
        <el-table :data="cases" style="width: 100%">
            <el-table-column prop="case_number" label="编号" width="120"></el-table-column>
            <el-table-column prop="title" label="标题"></el-table-column>
            <el-table-column label="优先级" width="100">
                <template #default="{row}">
                    <span style="color: red; font-weight: bold;">{{ row.priority_display }}</span>
                </template>
            </el-table-column>
            <el-table-column prop="case_type_display" label="类型" width="100"></el-table-column>
            <el-table-column prop="status_display" label="状态" width="100"></el-table-column>
        </el-table>
    </div>

    <!-- Vue 3 (使用 jsdelivr 生产版本) -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <!-- Element Plus (使用 jsdelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.6/dist/index.full.min.js"></script>
    <script>
        const { createApp } = Vue;
        
        const app = createApp({
            data() {
                return {
                    cases: [
                        { id: 1, case_number: 'CASE-0001', title: '测试用例1', priority: 'p2', priority_display: 'P2', case_type: 'functional', case_type_display: '功能测试', status: 'active', status_display: '激活' },
                        { id: 2, case_number: 'CASE-0002', title: '测试用例2', priority: 'p1', priority_display: 'P1', case_type: 'performance', case_type_display: '性能测试', status: 'active', status_display: '激活' },
                        { id: 3, case_number: 'CASE-0003', title: '测试用例3', priority: 'p3', priority_display: 'P3', case_type: 'compatibility', case_type_display: '兼容性测试', status: 'active', status_display: '激活' },
                        { id: 4, case_number: 'CASE-0004', title: '测试用例4', priority: 'p0', priority_display: 'P0', case_type: 'security', case_type_display: '安全性测试', status: 'active', status_display: '激活' }
                    ]
                };
            }
        });
        
        app.use(ElementPlus).mount('#app');
    </script>
</body>
</html>
