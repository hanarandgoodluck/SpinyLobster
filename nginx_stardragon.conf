# HTTP - 自动跳转到 HTTPS
server {
    listen 80;
    server_name stardragon.top www.stardragon.top;
    
    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他所有请求跳转到 HTTPS
    location / {
        return 301 https://www.stardragon.top$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name stardragon.top www.stardragon.top;

    # SSL 证书配置（稍后通过 certbot 自动配置）
    # ssl_certificate /etc/letsencrypt/live/www.stardragon.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.stardragon.top/privkey.pem;
    
    # 临时自签名证书（在获取正式证书前使用）
    ssl_certificate /etc/nginx/ssl/stardragon.top.crt;
    ssl_certificate_key /etc/nginx/ssl/stardragon.top.key;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 字符集
    charset utf-8;

    # 最大上传文件大小
    client_max_body_size 100M;

    # 静态文件 - Django collectstatic 收集的文件
    location /static/ {
        alias /opt/stardragon/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 媒体文件 - 用户上传的文件
    location /uploads/ {
        alias /opt/stardragon/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django 应用
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # WebSocket 支持（SSE 需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置 - AI 处理可能需要较长时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲设置
        proxy_buffering off;
    }

    # 健康检查端点
    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # 日志
    access_log /var/log/nginx/stardragon_access.log;
    error_log /var/log/nginx/stardragon_error.log;

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
